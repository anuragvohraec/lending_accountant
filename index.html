<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#6366F1" />
  <meta name="description" content="MunimJi - Offline-first lending & finance management PWA" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="icon" type="image/svg+xml" href="/icons/icon-192.svg" />
  <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
  <link rel="manifest" href="/manifest.json" />
  <title>MunimJi</title>
  <script defer src="https://cdn.jsdelivr.net/npm/pouchdb@9.0.0/dist/pouchdb.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>
</head>
<body class="bg-surface text-gray-900 font-display antialiased">
  <div id="app" class="min-h-screen flex flex-col">
    <div id="pin-lock" class="hidden fixed inset-0 z-50 bg-white flex items-center justify-center"></div>
    <div id="main-content" class="flex-1 flex flex-col">
      <header id="app-header" class="bg-white border-b border-gray-200 px-4 py-3 flex items-center gap-3 sticky top-0 z-40"></header>
      <main id="app-main" class="flex-1 overflow-y-auto px-4 pb-24 pt-4"></main>
      <nav id="app-nav" class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 z-40 safe-bottom"></nav>
    </div>
    <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>
    <div id="modal-container"></div>
  </div>
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
